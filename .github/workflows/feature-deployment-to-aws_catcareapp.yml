# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - catcareapp
on:
  push:
    branches:
      - feature/deployment-to-aws
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Create and start virtual environment
        run: |
          python -m venv .venv
          source .venv/bin/activate
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install gunicorn
      
      - name: Create runtime.txt
        run: |
          echo "python-3.12" > runtime.txt
      
      - name: Create startup command file
        run: |
          echo "gunicorn --bind=0.0.0.0 --timeout 600 application:app" > startup.txt
      
      - name: Clean up unnecessary files
        run: |
          rm -rf .git
          rm -rf .github
          rm -rf __pycache__
          rm -rf *.pyc
          find . -type d -name "__pycache__" -exec rm -r {} +
          find . -type f -name "*.pyc" -delete
      
      - name: Zip artifact for deployment
        run: |
          zip -r release.zip ./* \
          --exclude "*.git*" \
          --exclude "*__pycache__*" \
          --exclude "*.pytest_cache*" \
          --exclude "*.venv*" \
          --exclude "*.env*" \
          --exclude "*.vscode*" \
          --exclude "*.idea*"
      
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      
      - name: Unzip artifact for deployment
        run: unzip release.zip
      
      - name: Wait for SCM to be ready
        run: sleep 30
      
      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'catcareapp'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_8B0BE435528147DDB2857E387BF6C371 }}
          clean: true
          package: .
